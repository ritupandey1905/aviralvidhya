server.port=${PORT:8080}
spring.main.banner-mode=off

# CORS Configuration (Comma-separated list of origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}

# JWT Configuration
jwt.secret=my-super-secret-key-for-jwt-token-generation-and-validation-ensure-this-is-long-enough-at-least-256-bits
jwt.expiration=3600000
jwt.refresh.expiration=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.erpbackend=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Monitoring & Actuator Endpoints
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
